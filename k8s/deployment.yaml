apiVersion: v1
kind: Namespace
metadata:
  name: motion-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: motion-api
  namespace: motion-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: motion-api
  template:
    metadata:
      labels:
        app: motion-api
    spec:
      containers:
        - name: api
          image: motionregistry/api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: motion-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: motion-secrets
                  key: redis-url
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: motion-api
  namespace: motion-production
spec:
  selector:
    app: motion-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: motion-worker
  namespace: motion-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: motion-worker
  template:
    metadata:
      labels:
        app: motion-worker
    spec:
      containers:
        - name: worker
          image: motionregistry/api:latest
          command: ["celery", "-A", "app.workers.celery_app", "worker", "-l", "info", "-Q", "render,export"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: motion-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: motion-secrets
                  key: redis-url
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
